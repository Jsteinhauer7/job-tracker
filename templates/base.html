<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #f0f0f0; font-family: 'Segoe UI', sans-serif; }
         nav {
            background: rgba(15,15,15,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.06); padding: 14px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { font-size: 1.2rem; font-weight: 800; color: #6366f1; text-decoration: none; }
        .nav-links a {
            color: #888; text-decoration: none; margin-left: 20px;
            font-size: 0.9rem; transition: color 0.2s;
        }
        .nav-links a:hover { color: #6366f1; }
        .card {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
        }
        .btn-primary {
            background: #6366f1; border: none; border-radius: 10px;
            padding: 8px 20px; font-weight: 600;
        }
        .btn-primary:hover { background: #4f46e5; }
        .form-control, .form-select {
            background: #1e1e2e; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #f0f0f0; padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            background: #252538; border-color: #6366f1;
            color: #f0f0f0; box-shadow: none;
        }
        .form-control::placeholder { color: #888; }
        .form-label { color: #c0c0d0; font-weight: 500; }
        .table { color: #f0f0f0; }
        .table td, .table th { border-color: rgba(255,255,255,0.07); }
        h2, h3 { color: #ffffff; }
        .form-select option { background: #1a1a1a; }
        .alert {
            border-radius: 10px; border: none;
            background: rgba(239,68,68,0.15); color: #fca5a5;
        }
        .badge-applied { background: rgba(99,102,241,0.2); color: #818cf8; }
        .badge-interview { background: rgba(234,179,8,0.2); color: #fbbf24; }
        .badge-offer { background: rgba(34,197,94,0.2); color: #4ade80; }
        .badge-rejected { background: rgba(239,68,68,0.2); color: #f87171; }
    </style>
</head>
<body>
    {% if current_user.is_authenticated %}
    <nav>
        <a href="/" class="nav-logo">JobTracker</a>
        <div class="nav-links">
            <a href="/"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="/add"><i class="fas fa-plus"></i> Add Job</a>
            <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>
    {% endif %}

    <div class="container mt-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
