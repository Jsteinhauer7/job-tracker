{% extends 'base.html' %}
{% block content %}

<div style="max-width: 420px; margin: 80px auto;">
    <div class="card p-4">
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p class="text-muted mb-4">Sign in to your Job Tracker</p>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <p class="text-center mt-3" style="color:#666; font-size:0.9rem;">
            Don't have an account? <a href="/register" style="color:#6366f1;">Register</a>
        </p>
    </div>
</div>

{% endblock %}
